name: Daily Trend Radar

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        working-directory: trend-radar
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run trend-radar
        working-directory: trend-radar
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python trend_radar.py
      
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trend-radar/trends_*.html trend-radar/trends_*.md
          git diff --staged --quiet || git commit -m "🌱 Daily trends $(date +'%Y-%m-%d')"
          git push