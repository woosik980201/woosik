<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Radar</title>
    <style>
        body {
            font-family: sans-serif; text-align: center; margin: top 100px;}
            #quote{ font-size: 24px; margin-bottom: 20px; }
            button{padding: 10px 24px; font-size: 16px; cursor: pointer;}
    </style>
</head>
<body>
    <p id="quote">버튼을 눌러 오늘의 스타일을 확인하세요</p>
    <button id="style-btn">오늘의 스타일1</button>
     <button id="style-btn2">오늘의 스타일2</button>
     <button id="style-btn3">오늘의 스타일3</button>

    <script>
     //1단계: 바꿀 대상을 찾는다
     const quote = document.querySelector("#quote");
     const btn1 = document.querySelector("#style-btn");
     const btn2 = document.querySelector("#style-btn2");
     const btn3 = document.querySelector("#style-btn3");
     //동작을 한 곳에 모으고, 이름을 붙인다
     function changeStyle(text, color, fontSize = "24px") {
        quote.textContent = text;
        quote.style.color = color;
        quote.style.fontSize = fontSize;
     }

     //이제 버튼은 "무엇을 보여줄지"만 정하면 된다
     btn1.addEventListener("click", function(){
        changeStyle("오늘은 미니멀룩으로 가볍게.", "black");
     });
     btn2.addEventListener("click", function(){
        changeStyle("오늘은 스트릿룩으로 힙하게.", "tomato");
     });
     btn3.addEventListener("click", function(){
        changeStyle("오늘은 빈티지룩으로 무드있게.", "purple", "32px");
     });
    </script>
</body>
</html>
