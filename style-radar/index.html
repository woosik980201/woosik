<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Radar</title>
    <style>
        body {
            font-family: sans-serif; text-align: center; margin: top 100px;}
            #quote{ font-size: 24px; margin-bottom: 20px; }
            button{padding: 10px 24px; font-size: 16px; cursor: pointer;}
    </style>
</head>
<body>
    <p id="quote">버튼을 눌러 오늘의 스타일을 확인하세요</p>
    <button id="style-btn">오늘의 스타일</button>
     <button id="style-btn2">오늘의 스타일2</button>

    <script>
     //1단계: 바꿀 대상을 찾는다
     const quote = document.querySelector("#quote");
     const btn = document.querySelector("#style-btn");
     const btn2 = document.querySelector("#style-btn2");

     //2단계: "클릭"이라는 사건에 반응을 등록한다
     btn.addEventListener("click",function(){
        quote.textContent = "오늘은 미니멀룩으로 가볍게";
     });
      btn2.addEventListener("click",function(){
        quote.textContent = "오늘은 스트릿룩으로 힙하게";
        quote.style.color = "tomato";
     });
    </script>
</body>
</html>
